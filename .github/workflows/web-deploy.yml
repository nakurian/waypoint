name: web-deploy
on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'content/**'
      - 'packs/**'
      - 'shared/transform-core/**'
      - 'schemas/**'
      - '.github/workflows/web-deploy.yml'
  pull_request:
    paths:
      - 'web/**'
      - 'content/**'
      - 'packs/**'
      - 'shared/transform-core/**'
      - 'schemas/**'
      - '.github/workflows/web-deploy.yml'

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck + unit tests
        run: |
          pnpm --filter @waypoint/web typecheck
          pnpm --filter @waypoint/web test
      - name: Build (with GH Pages basePath)
        run: pnpm --filter @waypoint/web build
        env:
          WAYPOINT_BASE_PATH: /waypoint
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  visual:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browser
        run: pnpm --filter @waypoint/web exec playwright install --with-deps chromium
      - name: Build static export (no basePath for local serve)
        run: pnpm --filter @waypoint/web build
        # WAYPOINT_BASE_PATH intentionally unset: Playwright hits
        # http://localhost:3000/, so pages must resolve at the root.
      - name: Start static server and run visual tests
        run: |
          pnpm dlx serve web/out -l 3000 --no-clipboard &
          npx wait-on http://localhost:3000
          pnpm exec playwright test --config=web/playwright.config.ts --project=chromium --grep @visual
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs
          path: web/test-results/

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build, visual]
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
